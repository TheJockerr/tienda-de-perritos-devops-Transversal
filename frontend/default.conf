server {
    listen 80;
    server_name _;

    charset utf-8;
    root /usr/share/nginx/html;
    index index.html;

    # SPA / frontend estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy hacia el backend dentro del cluster
    location /api/ {
        proxy_pass http://44.221.90.228:3001/api/productos; # <-- Cambiado tienda-backend por tu IP real

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}